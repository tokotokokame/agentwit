[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /logs/*.jsonl
    Tag               agentwit.*
    Multiline         Off
    Refresh_Interval  5
    Read_from_Head    True

# Remove sensitive fields before forwarding
[FILTER]
    Name          record_modifier
    Match         agentwit.*
    Remove_key    Authorization
    Remove_key    api_key
    Remove_key    token
    Remove_key    password

[OUTPUT]
    Name            loki
    Match           agentwit.*
    Host            loki
    Port            3100
    Labels          job=agentwit
    Label_keys      $type,$risk_level
    Line_Format     json
    Auto_Kubernetes_Labels off

# ===========================================================================
# SIEM forwarding — Splunk / Elasticsearch / Loki (env-var driven)
# To use, set the appropriate environment variables and run with
# docker-compose.siem.yml instead of docker-compose.yml.
# ===========================================================================

[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off

[INPUT]
    Name          tail
    Path          ${AGENTWIT_LOG_PATH:-~/.agentwit/audit.jsonl}
    Tag           agentwit.*
    Parser        json
    Refresh_Interval 5

[FILTER]
    Name          record_modifier
    Match         agentwit.*
    Record        source agentwit
    Record        host ${HOSTNAME}

# Splunk HEC への転送（SPLUNK_HEC_TOKEN環境変数が必要）
[OUTPUT]
    Name          splunk
    Match         agentwit.*
    Host          ${SPLUNK_HOST:-splunk-server}
    Port          ${SPLUNK_PORT:-8088}
    Splunk_Token  ${SPLUNK_HEC_TOKEN}
    TLS           On
    TLS.Verify    Off

# Elasticsearch への転送（ES_HOSTが必要）
[OUTPUT]
    Name          es
    Match         agentwit.*
    Host          ${ES_HOST:-elasticsearch}
    Port          ${ES_PORT:-9200}
    Index         agentwit
    Type          _doc
    Logstash_Format On

# Loki への転送（Grafana Lokiスタック使用時）
[OUTPUT]
    Name          loki
    Match         agentwit.*
    Host          ${LOKI_HOST:-localhost}
    Port          ${LOKI_PORT:-3100}
    Labels        job=agentwit
