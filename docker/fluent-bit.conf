[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /logs/*.jsonl
    Tag               agentwit.*
    Multiline         Off
    Refresh_Interval  5
    Read_from_Head    True

# Remove sensitive fields before forwarding
[FILTER]
    Name          record_modifier
    Match         agentwit.*
    Remove_key    Authorization
    Remove_key    api_key
    Remove_key    token
    Remove_key    password

[OUTPUT]
    Name            loki
    Match           agentwit.*
    Host            loki
    Port            3100
    Labels          job=agentwit
    Label_keys      $type,$risk_level
    Line_Format     json
    Auto_Kubernetes_Labels off
