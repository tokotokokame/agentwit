name: Build GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd gui && npm install && npx tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: gui/src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd gui && npm install && npx tauri build
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: gui/src-tauri/target/release/bundle/msi/*.msi
