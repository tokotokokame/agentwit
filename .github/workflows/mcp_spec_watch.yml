name: MCP Spec Watch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  check-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Install agentwit
        run: pip install -e ".[dev]"

      - name: Get latest MCP spec tag
        id: latest
        run: |
          LATEST_TAG=$(curl -s \
  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
  https://api.github.com/repos/modelcontextprotocol/specification/tags \
  | jq -r 'if type == "array" then .[0].name else empty end')
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Read previous tag
        id: previous
        run: |
          PREV_TAG=$(jq -r '.tag' .github/mcp_spec_version.json)
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changed
        run: |
          if [ "${{ steps.latest.outputs.tag }}" != "${{ steps.previous.outputs.tag }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch CHANGELOG
        if: steps.changed.outputs.changed == 'true'
        id: changelog
        run: |
          CHANGELOG=$(curl -s \
            "https://raw.githubusercontent.com/modelcontextprotocol/specification/${{ steps.latest.outputs.tag }}/CHANGELOG.md" \
            | head -50 || echo "(no CHANGELOG)")
          {
            echo "content<<EOF"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.changed.outputs.changed == 'true'
        id: tests
        run: |
          if pytest tests/ -v; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Issue (tests passed)
        if: steps.changed.outputs.changed == 'true' && steps.tests.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 MCP仕様変更検知: ${{ steps.latest.outputs.tag }}`,
              body: [
                `## MCP仕様が更新されました`,
                ``,
                `- **旧バージョン:** \`${{ steps.previous.outputs.tag }}\``,
                `- **新バージョン:** \`${{ steps.latest.outputs.tag }}\``,
                `- **テスト:** ✅ 全通過`,
                ``,
                `## CHANGELOG (先頭50行)`,
                ``,
                `\`\`\``,
                `${{ steps.changelog.outputs.content }}`,
                `\`\`\``,
              ].join('\n'),
              labels: ['mcp-spec-update'],
            });

      - name: Create GitHub Issue (tests failed)
        if: steps.changed.outputs.changed == 'true' && steps.tests.outputs.passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 MCP仕様変更検知・テスト失敗: ${{ steps.latest.outputs.tag }}`,
              body: [
                `## MCP仕様が更新されましたが、テストが失敗しました`,
                ``,
                `- **旧バージョン:** \`${{ steps.previous.outputs.tag }}\``,
                `- **新バージョン:** \`${{ steps.latest.outputs.tag }}\``,
                `- **テスト:** ❌ 失敗`,
                ``,
                `## CHANGELOG (先頭50行)`,
                ``,
                `\`\`\``,
                `${{ steps.changelog.outputs.content }}`,
                `\`\`\``,
                ``,
                `対応が必要です。`,
              ].join('\n'),
              labels: ['mcp-spec-update', 'test-failure'],
            });

      - name: Discord notification
        if: steps.changed.outputs.changed == 'true' && env.MCP_SPEC_WEBHOOK != ''
        env:
          MCP_SPEC_WEBHOOK: ${{ secrets.MCP_SPEC_WEBHOOK }}
        run: |
          if [ "${{ steps.tests.outputs.passed }}" = "true" ]; then
            EMOJI="📋"
            STATUS="テスト ✅ 通過"
          else
            EMOJI="🚨"
            STATUS="テスト ❌ 失敗"
          fi
          curl -s -X POST "$MCP_SPEC_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${EMOJI} MCP仕様変更検知: \`${{ steps.latest.outputs.tag }}\` (旧: \`${{ steps.previous.outputs.tag }}\`) ${STATUS}\"}"

      - name: Update mcp_spec_version.json
        if: steps.changed.outputs.changed == 'true'
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"tag\": \"${{ steps.latest.outputs.tag }}\", \"last_checked\": \"${NOW}\"}" \
            > .github/mcp_spec_version.json

      - name: Commit updated spec version
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/mcp_spec_version.json
          git commit -m "chore: update MCP spec version to ${{ steps.latest.outputs.tag }}"
          git push
